<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RailBot | India Concierge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header>
            <h2>RailBot</h2>
            <p>Premium Indian Railways AI</p>
        </header>
        <div id="chat-box" class="chat-box">
            <div class="message bot-message">Hello! Where are we headed today? <br><small>Try: "Rourkela to Puri" or "Mumbai to Delhi"</small></div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="e.g. Ahmedabad to Surat..." autocomplete="off">
            <button id="send-btn">Search</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
