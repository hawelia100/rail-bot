<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RailBot | Premium Travel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header>
            <h2>RailBot</h2>
            <p>Premium Concierge</p>
        </header>
        <div id="chat-box" class="chat-box">
            <div class="message bot-message">Hello! Where would you like to travel today? (Type: "From [City] to [City]")</div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="e.g. Mumbai to Delhi..." autocomplete="off">
            <button id="send-btn">Search</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
